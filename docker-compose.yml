networks:
  dev:

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    networks:
      - dev

  dbgate:
    image: dbgate/dbgate
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:3000"
    environment:
      ADMIN_PASSWORD: ${DB_PASSWORD}
    networks:
      - dev

  frontend:
    build:
      context: ./wwwhypda-frontendV2
      dockerfile: Dockerfile
    env_file:
      - ./wwwhypda-frontendV2/.env.production
    volumes:
      - frontend_dist:/frontend-dist
    command: sh -c "npm run build && cp -r /app/dist/. /frontend-dist"
    working_dir: /app
    restart: "no"
    networks:
      - dev

  backend:
    build:
      context: .
      dockerfile: ./wwwhypda-backend/Dockerfile
    env_file:
      - ./wwwhypda-backend/env.prod
    restart: unless-stopped
    depends_on:
      - db
    networks:
      - dev

  migrate:
    profiles:
      - migrate
    build:
      context: .
      dockerfile: ./wwwhypda-backend/Dockerfile
    env_file:
      - ./wwwhypda-backend/env.prod
    command: python /migrate_v5.py
    depends_on:
      - db
    networks:
      - dev
    restart: "no"

  nginx:
    image: nginx:stable-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - dev

volumes:
  frontend_dist:
  postgres_data: